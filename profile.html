<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>
    VELYN — Profile
  </title>

  <meta
    name="description"
    content="Manage your VELYN profile, stats, streaks and progression."
  >

  <!-- GOOGLE FONT -->

  <link
    rel="preconnect"
    href="https://fonts.googleapis.com"
  >

  <link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin
  >

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  >

  <!-- CSS -->

  <link
    rel="stylesheet"
    href="CSS/profile.css"
  >

</head>

<body>

  <!-- BACKGROUND -->

  <div class="bg-glow glow-1"></div>
  <div class="bg-glow glow-2"></div>

  <!-- TOP BAR -->

  <div class="top-bar">

    <!-- LOGO -->

    <a
      href="app.html"
      class="logo-link"
    >

      <img
        src="Images/VELYN Logos-03.png"
        class="nav-logo"
        alt="VELYN Logo"
      >

    </a>

    <!-- BACK BUTTON -->

    <a
      href="app.html"
      class="back-btn"
    >

      ← Dashboard

    </a>

  </div>

  <!-- PROFILE -->

  <div class="profile-wrapper">

    <div class="profile-container">

      <!-- PROFILE TOP -->

      <div class="profile-top">

        <!-- AVATAR -->

        <div
          class="avatar"
          id="avatarContainer"
        >

          <img
            id="avatarImage"
            class="avatar-image"
          >

          <span id="avatarLetter">

            F

          </span>

        </div>

        <!-- UPLOAD -->

        <input
          type="file"
          id="avatarInput"
          accept="image/*"
          hidden
        >

        <button
          class="upload-btn"
          id="uploadAvatarBtn"
        >

          Change Picture

        </button>

        <!-- USERNAME -->

        <h1 id="profileUsername">

          User

        </h1>

        <!-- JOIN DATE -->

        <p
          class="joined-text"
          id="joinedDate"
        >

          Joined recently

        </p>

      </div>

      <!-- BIO -->

      <div class="bio-section">

        <div class="section-title">

          <h3>
            About You
          </h3>

          <p>
            Add a short bio to personalize your profile.
          </p>

        </div>

        <div class="bio-box">

          <textarea
            id="profileBio"
            maxlength="120"
            placeholder="Write your bio..."
          ></textarea>

          <div class="bio-bottom">

            <span class="bio-limit">

              Max 120 characters

            </span>

            <button
              id="saveBioBtn"
              class="upload-btn"
            >

              Save Bio

            </button>

          </div>

        </div>

      </div>

      <!-- STATS -->

      <div class="stats-section">

        <div class="section-title">

          <h3>
            Your Progress
          </h3>

          <p>
            Track your consistency and growth.
          </p>

        </div>

        <div class="profile-stats">

          <!-- XP -->

          <div class="profile-card">

            <h2 id="profileXP">

              0

            </h2>

            <p>

              ⚡ XP

            </p>

          </div>

          <!-- LEVEL -->

          <div class="profile-card">

            <h2 id="profileLevel">

              0

            </h2>

            <p>

              🧠 Level

            </p>

          </div>

          <!-- STREAK -->

          <div class="profile-card">

            <h2 id="profileStreak">

              0

            </h2>

            <p>

              🔥 Streak

            </p>

          </div>

          <!-- SESSIONS -->

          <div class="profile-card">

            <h2 id="profileSessions">

              0

            </h2>

            <p>

              📊 Sessions

            </p>

          </div>

        </div>

      </div>

    </div>

  </div>

  <!-- SUPABASE -->

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- JS -->

  <script src="JS/profile.js"></script>

</body>
</html>
