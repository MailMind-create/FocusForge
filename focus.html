<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Focus Session</title>

  <link rel="stylesheet" href="CSS/focus.css">
</head>

<body>

  <!-- TOP BAR -->
  <div class="top-bar">
    <img src="Images/VELYN Logos-03.png" class="logo">
    <a href="app.html" class="exit-btn">Exit</a>
  </div>

  <!-- MAIN -->
  <div class="focus-container">

    <!-- TASK -->
    <input
      type="text"
      class="task-input"
      placeholder="What are you committing to?"
    >

    <!-- OPTIONAL DAILY GOAL -->
    <select id="goalSelect" class="goal-select">

      <option value="">
        Optional Daily Goal
      </option>

    </select>

    <!-- TIME SELECT -->
    <div class="time-select">
      <button type="button" data-time="900">15m</button>
      <button type="button" data-time="1500" class="active">25m</button>
      <button type="button" data-time="2700">45m</button>
    </div>

    <!-- TIMER -->
    <div class="timer" id="timer">25:00</div>

    <!-- START / END BUTTON -->
    <button
      type="button"
      class="main-btn"
      id="mainBtn"
    >
      Start Session
    </button>

    <!-- END STATE -->
    <div class="end-state" id="endState">

      <p>Did you complete your task?</p>

      <div class="end-buttons">

        <button type="button" class="yes">
          Yes
        </button>

        <button type="button" class="no">
          No
        </button>

      </div>

    </div>

  </div>

  <!-- BOTTOM -->
  <div class="bottom-bar">

    <span id="streak">
      🔥 Streak: 0
    </span>

    <span id="sessions">
      Sessions: 0
    </span>

    <span id="xp">
      XP: 0
    </span>

    <span id="level">
      Level: 0
    </span>

  </div>

  <!-- POPUP -->
  <div id="popup" class="popup">

    <div class="popup-content">

      <p id="popupText"></p>

      <button
        type="button"
        id="popupBtn"
      >
        Continue
      </button>

    </div>

  </div>

  <!-- CONFETTI -->
  <canvas id="confetti"></canvas>

  <!-- SCRIPTS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script src="JS/timer.js"></script>

</body>
</html>
