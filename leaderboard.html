<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>
    VELYN — Leaderboard
  </title>

  <meta
    name="description"
    content="Compete with the most disciplined and focused users inside VELYN."
  >

  <!-- GOOGLE FONT -->

  <link
    rel="preconnect"
    href="https://fonts.googleapis.com"
  >

  <link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin
  >

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  >

  <!-- CSS -->

  <link
    rel="stylesheet"
    href="CSS/leaderboard.css"
  >

</head>

<body>

  <!-- BACKGROUND -->

  <div class="bg-glow glow-1"></div>
  <div class="bg-glow glow-2"></div>

  <!-- TOP BAR -->

  <div class="top-bar">

    <!-- LOGO -->

    <a
      href="app.html"
      class="logo-link"
    >

      <img
        src="Images/VELYN Logos-03.png"
        class="nav-logo"
        alt="VELYN Logo"
      >

    </a>

    <!-- BACK -->

    <a
      href="app.html"
      class="back-btn"
    >

      ← Dashboard

    </a>

  </div>

  <!-- PAGE -->

  <div class="leaderboard-wrapper">

    <div class="leaderboard-container">

      <!-- HEADER -->

      <div class="leaderboard-header">

        <div class="hero-badge">

          Rankings • Discipline • Competition

        </div>

        <h1>

          Global Leaderboard

        </h1>

        <p class="subtitle">

          Compete with the most focused
          and disciplined users in VELYN.

        </p>

      </div>

      <!-- TABS -->

      <div class="tabs">

        <button
          class="tab-btn active"
          id="globalTab"
        >

          🌍 Global

        </button>

        <button
          class="tab-btn"
          id="friendsTab"
        >

          👥 Friends

        </button>

      </div>

      <!-- TOP 3 -->

      <div
        class="top-three"
        id="topThree"
      >

      </div>

      <!-- LIST -->

      <div
        class="leaderboard-list"
        id="leaderboardList"
      >

      </div>

    </div>

  </div>

  <!-- SUPABASE -->

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- JS -->

  <script src="JS/leaderboard.js"></script>

</body>
</html>
